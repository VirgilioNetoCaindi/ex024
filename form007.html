<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <label for="iest">Provincia</label>
            <select name="estado" id="iest">
                 
            <option value="LD">Luanda</option>
            <option value="BL">Benguela</option>
            <option value="LB">Lubango</option>
            <option value="UG">Uige</option>
            <option value="KS">Kwanza Sul</option>
            <option value="KN">Kwanza Norte</option>
            </select>
        </p>
        <p>
            <label for="iprof">Profissão</label>
            <input type="text" name="prof" id="iprof" list="istprof">
            <datalist id="istprof">
              <option>Especialista em T.I</option>
              <option>Cybersegurança</option>
              <option>Hacker ético</option>
              <option>Desemvolvidor Web</option>
            </datalist>
        </p>
        <p>
            <label for="imsg">Mensagem</label><br>
            <textarea name="msg" id="imsg">Sua mensagem...

            </textarea>
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
    
</body>
</html>
